@if (isOpen) {
  <div class="modal-overlay" (click)="onClose()">
    <div class="modal-container glass-card" (click)="onContentClick($event)">
      <div class="modal-header">
        <h3 class="modal-title">{{ languageService.t().hero.btnResume || 'Currículum' }}</h3>
        <button class="close-btn" (click)="onClose()" aria-label="Close">
          <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <line x1="18" y1="6" x2="6" y2="18"></line>
            <line x1="6" y1="6" x2="18" y2="18"></line>
          </svg>
        </button>
      </div>
      
      <div class="modal-body">
        <div class="pdf-container">
          <object data="/cv.pdf" type="application/pdf" width="100%" height="100%">
            <!-- Fallback para navegadores que no soportan PDFs nativos -->
            <div style="padding: 20px; color: white; text-align: center;">
              <p>Tu navegador no soporta la previsualización de PDFs. <a href="/cv.pdf" target="_blank" style="color: var(--color-cyan);">Descargalo acá</a>.</p>
            </div>
          </object>
        </div>
      </div>
      
      <div class="modal-footer">
        <a href="/cv.pdf" download="Felipe_Schenberger_CV.pdf" class="btn-primary btn-download">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path>
            <polyline points="7 10 12 15 17 10"></polyline>
            <line x1="12" y1="15" x2="12" y2="3"></line>
          </svg>
          <span>{{ languageService.language() === 'es' ? 'Descargar PDF' : 'Download PDF' }}</span>
        </a>
      </div>
    </div>
  </div>
}
