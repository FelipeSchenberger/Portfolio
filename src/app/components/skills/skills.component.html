<section class="section skills" id="skills">
  <div class="container">
    <h2 class="section-title reveal">{{ languageService.t().skills.title }}</h2>
    <p class="section-subtitle reveal">{{ languageService.t().skills.subtitle }}</p>

    <div class="skills-grid">
      @for (category of categories(); track category.title; let i = $index) {
        <div class="skill-category glass-card reveal" [style.transition-delay]="(i * 0.1) + 's'">
          <div class="category-header">
            <span class="category-icon">{{ category.icon }}</span>
            <h3 class="category-title">{{ category.title }}</h3>
          </div>
          <div class="skill-tags">
            @for (item of category.items; track item) {
              <span class="skill-tag">{{ item }}</span>
            }
          </div>
        </div>
      }
    </div>
  </div>
</section>
