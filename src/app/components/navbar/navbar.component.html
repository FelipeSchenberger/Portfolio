<nav class="navbar" [class.scrolled]="isScrolled">
  <div class="nav-container">
    <a class="nav-logo" href="#hero" (click)="scrollTo($event, '#hero')">
      <span class="logo-bracket">&lt;</span>
      <span class="logo-text">FS</span>
      <span class="logo-bracket">/&gt;</span>
    </a>

    <ul class="nav-links" [class.active]="isMobileMenuOpen">
      @for (link of navLinks(); track link.href) {
        <li>
          <a [href]="link.href" (click)="scrollTo($event, link.href)">{{ link.label }}</a>
        </li>
      }
      
      <li class="lang-toggle-wrapper">
        <button class="lang-toggle" (click)="languageService.toggleLanguage()">
          <span [class.active]="languageService.language() === 'es'">ES</span>
          <span class="divider">|</span>
          <span [class.active]="languageService.language() === 'en'">EN</span>
        </button>
      </li>
    </ul>

    <button class="hamburger" [class.active]="isMobileMenuOpen" (click)="toggleMobileMenu()" aria-label="Menu">
      <span></span>
      <span></span>
      <span></span>
    </button>
  </div>
</nav>

<!-- Mobile overlay -->
@if (isMobileMenuOpen) {
  <div class="mobile-overlay" (click)="closeMobileMenu()"></div>
}
